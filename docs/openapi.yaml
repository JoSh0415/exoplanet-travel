openapi: 3.0.3

info:
  title: Exoplanet Travel Agency API
  version: 0.1.0
  description: |
    REST API for browsing exoplanet destinations and booking travel holidays.

    ## Conventions
    - All responses are JSON (`application/json`) unless otherwise stated.
    - Pagination uses `page` (1-indexed) and `pageSize`.
    - Error responses follow a consistent shape:
      `{ "error": { "code": string, "message": string, "details"?: any } }`
  contact:
    name: API Maintainer
  license:
    name: Academic Use

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://exoplanet-travel.vercel.app
    description: Deployed server

tags:
  - name: Exoplanets
    description: Browse exoplanet catalogue and retrieve planet details.
  - name: Bookings
    description: Create and manage travel bookings.
  - name: Auth
    description: User registration, login, logout, and session management.
  - name: Admin
    description: Admin-only endpoints for data import management.
  - name: Analytics
    description: Aggregated statistics for dashboards and charts.
  - name: Health
    description: Service health and readiness checks.

paths:
  /api/health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Health check
      description: |
        Liveness / readiness probe. Returns service status and database
        connectivity. Returns 200 when healthy, 503 when degraded.
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is degraded (e.g. database unreachable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/exoplanets:
    get:
      tags: [Exoplanets]
      operationId: listExoplanets
      summary: List exoplanets
      description: |
        Returns a paginated list of exoplanets with optional filters.

        ### Typical usage
        - Show a catalogue page (paged list)
        - Filter by `vibe` or distance range
        - Search by partial planet name using `q`
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/VibeParam"
        - $ref: "#/components/parameters/MinDistanceParam"
        - $ref: "#/components/parameters/MaxDistanceParam"
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/OrderParam"
      responses:
        "200":
          description: Paginated list of exoplanets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExoplanetsResponse"
              examples:
                example:
                  summary: Page 1 results
                  value:
                    items:
                      - id: cmlp9k8qn0003dskufekwmztt
                        name: HD 219134 c
                        distance: 21.3
                        temperature: 782
                        gravity: 1.91
                        vibe: Molten Rock
                        discoveryYear: 2015
                    page: 1
                    pageSize: 20
                    total: 500
                    totalPages: 25
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/exoplanets/{id}:
    get:
      tags: [Exoplanets]
      operationId: getExoplanetById
      summary: Get exoplanet by id
      description: |
        Returns full details for a single exoplanet by its unique id.

        ### Typical usage
        - Planet detail page after selecting an item from the catalogue
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      responses:
        "200":
          description: Exoplanet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exoplanet"
              examples:
                example:
                  summary: Example planet
                  value:
                    id: cmlp9k8qn0000dskuetg0pq62
                    name: HD 219134 b
                    distance: 21.3
                    temperature: 782
                    gravity: 1.91
                    vibe: Molten Rock
                    discoveryYear: 2015
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/bookings:
    get:
      tags: [Bookings]
      operationId: listBookings
      summary: List bookings
      security:
        - cookieAuth: []
      description: |
        Returns a paginated list of bookings.

        - **Regular users** see only their own bookings.
        - **Admins** see all bookings across users.

        Requires a valid session cookie.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBookingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Bookings]
      operationId: createBooking
      summary: Create a booking
      security:
        - cookieAuth: []
      description: |
        Creates a booking for the authenticated user to travel to a selected exoplanet.

        The `userId` is derived from the session cookie — do not include it in the body.
        Requires a valid session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
            examples:
              example:
                summary: Create booking
                value:
                  planetId: cmlp9k8qn0007dskuhej1ifkh
                  travelClass: Economy (Cryo-Sleep)
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/bookings/{id}:
    get:
      tags: [Bookings]
      operationId: getBooking
      summary: Get a single booking by ID
      security:
        - cookieAuth: []
      description: |
        Returns a single booking with user and planet details.

        - Only the **booking owner** or an **ADMIN** can view a booking.
        - Returns `403 Forbidden` if the user is neither owner nor admin.
        - Requires a valid session cookie.
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Bookings]
      operationId: updateBooking
      summary: Update a booking (partial)
      security:
        - cookieAuth: []
      description: |
        Partially updates a booking.

        - Only the **booking owner** or an **ADMIN** can update a booking.
        - Returns `403 Forbidden` if the user is neither owner nor admin.
        - **Non-admin** users may only set `status` to `"CANCELLED"`; any other value returns `403`.
        - Requires a valid session cookie.
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingRequest"
            examples:
              example:
                summary: Update travel class
                value:
                  travelClass: First Class (Warp Drive)
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Bookings]
      operationId: deleteBooking
      summary: Delete a booking
      security:
        - cookieAuth: []
      description: |
        Deletes a booking.

        - Only the **booking owner** or an **ADMIN** can delete a booking.
        - Returns `403 Forbidden` if the user is neither owner nor admin.
        - Requires a valid session cookie.
        - Returns `204 No Content` on success.
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
      responses:
        "204":
          description: Deleted successfully (no content)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      description: |
        Creates a new user account and sets a session cookie.

        - Email is stored as lowercase.
        - Returns `409` if the email is already registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              example:
                summary: Register a user
                value:
                  email: jane@example.com
                  password: securePass123
                  name: Jane Doe
      responses:
        "201":
          description: User created and session set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                example:
                  value:
                    error:
                      code: EMAIL_EXISTS
                      message: An account with this email already exists
        "429":
          description: Too many registration attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                example:
                  value:
                    error:
                      code: TOO_MANY_REQUESTS
                      message: Too many registration attempts. Please try again later.

  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in with email and password
      description: |
        Authenticates a user and sets an httpOnly session cookie (`exo-session`).

        Returns `401` if the email or password is invalid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              example:
                summary: Login
                value:
                  email: jane@example.com
                  password: securePass123
      responses:
        "200":
          description: Login successful (session cookie set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                example:
                  value:
                    error:
                      code: INVALID_CREDENTIALS
                      message: Invalid email or password
        "429":
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                example:
                  value:
                    error:
                      code: TOO_MANY_REQUESTS
                      message: Too many login attempts. Please try again later.

  /api/auth/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get currently authenticated user
      description: |
        Returns the currently authenticated user based on the session cookie.

        If no valid session cookie is present, returns `{ user: null }` (still 200).
      responses:
        "200":
          description: Current user (or null if unauthenticated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/SessionUser"
              examples:
                authenticated:
                  summary: Logged-in user
                  value:
                    user:
                      id: cmlp9k8ut00dwdskud6g70sxc
                      email: jane@example.com
                      name: Jane Doe
                      role: USER
                unauthenticated:
                  summary: No session
                  value:
                    user: null

  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out (clear session cookie)
      description: |
        Clears the session cookie. Returns `{ success: true }`.
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
              examples:
                example:
                  value:
                    success: true

  /api/admin/refresh-exoplanets:
    post:
      tags: [Admin]
      operationId: refreshExoplanets
      summary: Import/refresh exoplanets from NASA
      security:
        - cookieAuth: []
      description: |
        Triggers a fresh import from the NASA Exoplanet Archive TAP service.
        Upserts planets (insert new, update existing) and records the import run.

        - Requires ADMIN role.
        - Returns `207` if the import completed with errors.
      responses:
        "200":
          description: Import completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResult"
        "207":
          description: Import completed with errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/import-runs:
    get:
      tags: [Admin]
      operationId: listImportRuns
      summary: List data import runs
      security:
        - cookieAuth: []
      description: |
        Returns a paginated list of data import run records.

        - Requires ADMIN role.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of import runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedImportRunsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/analytics/vibes:
    get:
      tags: [Analytics]
      operationId: getVibeAnalytics
      summary: Vibe distribution analytics
      description: |
        Returns two arrays:
        - `vibes` – count of exoplanets per vibe category.
        - `topBooked` – vibes ranked by total booking count.
      responses:
        "200":
          description: Vibe analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VibesResponse"
              examples:
                example:
                  summary: Vibe breakdown
                  value:
                    vibes:
                      - vibe: Habitable Paradise
                        count: 42
                      - vibe: Molten Rock
                        count: 38
                      - vibe: Mysterious
                        count: 25
                    topBooked:
                      - vibe: Habitable Paradise
                        bookings: 120
                      - vibe: Mysterious
                        bookings: 78

  /api/analytics/top-destinations:
    get:
      tags: [Analytics]
      operationId: getTopDestinations
      summary: Top-booked destinations
      description: |
        Returns the most popular exoplanets ranked by total booking count.
      parameters:
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Top destinations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopDestinationsResponse"
              examples:
                example:
                  summary: Top 3 destinations
                  value:
                    destinations:
                      - planetId: cmlp9k8qn0003dskufekwmztt
                        name: HD 219134 c
                        distance: 21.3
                        vibe: Molten Rock
                        bookings: 45
                      - planetId: cmlp9k8qn0007dskuhej1ifkh
                        name: Proxima Centauri b
                        distance: 4.24
                        vibe: Habitable Paradise
                        bookings: 32
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/analytics/bookings-summary:
    get:
      tags: [Analytics]
      operationId: getBookingsSummary
      summary: Booking summary statistics
      description: |
        Returns:
        - `totalBookings` – overall count.
        - `byTravelClass` – breakdown by travel class.
        - `byPeriod` – time-series data grouped by day or month.

        Use `from`/`to` to restrict the date range.
      parameters:
        - $ref: "#/components/parameters/FromParam"
        - $ref: "#/components/parameters/ToParam"
        - $ref: "#/components/parameters/GroupByParam"
      responses:
        "200":
          description: Booking summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingsSummaryResponse"
              examples:
                example:
                  summary: Monthly summary
                  value:
                    totalBookings: 256
                    byTravelClass:
                      - travelClass: Economy (Cryo-Sleep)
                        count: 180
                      - travelClass: First Class (Warp Drive)
                        count: 76
                    byPeriod:
                      - period: "2025-01"
                        count: 120
                      - period: "2025-02"
                        count: 136
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: exo-session
      description: |
        JWT session token stored in an httpOnly cookie named `exo-session`.
        Obtain by calling POST /api/auth/login or POST /api/auth/register.

  parameters:
    IdPathParam:
      in: path
      name: id
      required: true
      description: Resource id (Prisma CUID format, e.g. `c` followed by lowercase alphanumeric characters).
      schema:
        type: string
        minLength: 10
        pattern: "^c[a-z0-9]+$"
      example: cmlp9k8qn0003dskufekwmztt

    PageParam:
      in: query
      name: page
      description: Page number (1-indexed).
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1

    PageSizeParam:
      in: query
      name: pageSize
      description: Number of results per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20

    SearchParam:
      in: query
      name: q
      description: Case-insensitive substring search in planet name (1–100 characters).
      schema:
        type: string
        minLength: 1
        maxLength: 100
      example: gliese

    VibeParam:
      in: query
      name: vibe
      description: Filter by derived category (e.g., "Molten Rock", "Mysterious"). 1–60 characters.
      schema:
        type: string
        minLength: 1
        maxLength: 60
      example: Molten Rock

    MinDistanceParam:
      in: query
      name: minDistance
      description: Minimum distance in light years (inclusive).
      schema:
        type: number
        minimum: 0
      example: 0

    MaxDistanceParam:
      in: query
      name: maxDistance
      description: Maximum distance in light years (inclusive).
      schema:
        type: number
        minimum: 0
      example: 25

    SortParam:
      in: query
      name: sort
      description: Field used to sort results.
      schema:
        type: string
        enum: [distance, discoveryYear, name]
        default: distance

    OrderParam:
      in: query
      name: order
      description: Sort order.
      schema:
        type: string
        enum: [asc, desc]
        default: asc

    LimitParam:
      in: query
      name: limit
      description: Maximum number of results to return (1-100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      example: 10

    FromParam:
      in: query
      name: from
      description: Start date filter (YYYY-MM-DD, inclusive).
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
      example: "2025-01-01"

    ToParam:
      in: query
      name: to
      description: End date filter (YYYY-MM-DD, inclusive).
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
      example: "2025-12-31"

    GroupByParam:
      in: query
      name: groupBy
      description: Time granularity for the `byPeriod` array.
      schema:
        type: string
        enum: [day, month]
        default: day

  responses:
    BadRequest:
      description: Validation error (invalid parameters or body)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            example:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: Invalid query parameters
                  details:
                    fieldErrors:
                      page:
                        - Too small: expected number to be >=1

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            example:
              value:
                error:
                  code: NOT_FOUND
                  message: Resource not found

    Unauthorized:
      description: Authentication required (no valid session cookie)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            example:
              value:
                error:
                  code: UNAUTHORIZED
                  message: Authentication required

    Forbidden:
      description: Insufficient permissions (not owner or admin)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            example:
              value:
                error:
                  code: FORBIDDEN
                  message: You can only modify your own bookings

  schemas:
    Exoplanet:
      type: object
      required: [id, name, distance]
      properties:
        id:
          type: string
          description: Unique identifier (Prisma cuid).
        name:
          type: string
          description: Planet name from NASA Exoplanet Archive.
        distance:
          type: number
          description: Distance in light years.
        temperature:
          type: number
          nullable: true
          description: Equilibrium temperature in Kelvin (may be null if unknown).
        gravity:
          type: number
          nullable: true
          description: Derived gravity proxy using mass/radius if available.
        vibe:
          type: string
          nullable: true
          description: Derived category based on temperature and size.
        discoveryYear:
          type: integer
          nullable: true
          description: Discovery year (may be null).

    Booking:
      type: object
      required: [id, userId, planetId, travelClass, status, bookingDate]
      properties:
        id:
          type: string
          description: Unique identifier (Prisma cuid).
        userId:
          type: string
          description: User id who owns the booking.
        planetId:
          type: string
          description: Exoplanet id being booked.
        travelClass:
          type: string
          description: Travel class label chosen by the user.
        status:
          type: string
          enum: [CONFIRMED, CANCELLED]
          description: Booking status.
        bookingDate:
          type: string
          format: date-time
          description: Timestamp when the booking was created.

    BookingDetail:
      description: |
        A booking with nested user and planet details.
        Returned by GET /api/bookings/{id}.
      allOf:
        - $ref: "#/components/schemas/Booking"
        - type: object
          required: [user, planet]
          properties:
            user:
              type: object
              required: [id, name, email]
              properties:
                id:
                  type: string
                name:
                  type: string
                  nullable: true
                email:
                  type: string
            planet:
              type: object
              required: [id, name, distance]
              properties:
                id:
                  type: string
                name:
                  type: string
                distance:
                  type: number
                vibe:
                  type: string
                  nullable: true
                discoveryYear:
                  type: integer
                  nullable: true

    CreateBookingRequest:
      type: object
      required: [planetId, travelClass]
      properties:
        planetId:
          type: string
          format: cuid
          description: Exoplanet id (CUID format).
        travelClass:
          type: string
          minLength: 1
          maxLength: 60
          description: Travel class selection.

    UpdateBookingRequest:
      type: object
      description: |
        Provide at least one field to update.
        **Note:** Non-admin users may only set `status` to `"CANCELLED"`. Setting any
        other status value as a non-admin returns `403 Forbidden`.
      properties:
        travelClass:
          type: string
          minLength: 1
          maxLength: 60
          description: Updated travel class selection.
        status:
          type: string
          enum: [CONFIRMED, CANCELLED]
          description: Updated booking status. Non-admin users may only set this to `CANCELLED`.

    PaginatedExoplanetsResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Exoplanet"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    PaginatedBookingsResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BookingListItem"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    BookingListItem:
      type: object
      required: [id, bookingDate, travelClass, status, user, planet]
      properties:
        id:
          type: string
        bookingDate:
          type: string
          format: date-time
        travelClass:
          type: string
        status:
          type: string
          description: Booking status.
        user:
          type: object
          properties:
            id: { type: string }
            name: { type: string, nullable: true }
            email: { type: string }
        planet:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            distance: { type: number }
            vibe: { type: string, nullable: true }
            discoveryYear: { type: integer, nullable: true }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code.
            message:
              type: string
              description: Human-readable error message.
            details:
              nullable: true
              description: Optional validation or debug details.

    VibesResponse:
      type: object
      required: [vibes, topBooked]
      properties:
        vibes:
          type: array
          items:
            type: object
            required: [vibe, count]
            properties:
              vibe:
                type: string
                nullable: true
              count:
                type: integer
        topBooked:
          type: array
          items:
            type: object
            required: [vibe, bookings]
            properties:
              vibe:
                type: string
                nullable: true
              bookings:
                type: integer

    TopDestinationsResponse:
      type: object
      required: [destinations]
      properties:
        destinations:
          type: array
          items:
            type: object
            required: [planetId, name, distance, vibe, bookings]
            properties:
              planetId:
                type: string
              name:
                type: string
              distance:
                type: number
                nullable: true
              vibe:
                type: string
                nullable: true
              bookings:
                type: integer

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          description: User email (stored lowercase).
        password:
          type: string
          minLength: 8
          maxLength: 100
          description: Password (8–100 characters).
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Display name (1–100 characters).

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    UserPublic:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [USER, ADMIN]

    SessionUser:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [USER, ADMIN]

    RefreshResult:
      type: object
      required: [message, retrievedAt, tapQuery, insertedCount, updatedCount]
      properties:
        message:
          type: string
          description: Human-readable summary of the import result.
        retrievedAt:
          type: string
          format: date-time
          description: Timestamp when data was retrieved from NASA.
        tapQuery:
          type: string
          description: The TAP query that was executed.
        insertedCount:
          type: integer
          description: Number of new exoplanets inserted.
        updatedCount:
          type: integer
          description: Number of existing exoplanets updated.
        errorMessage:
          type: string
          nullable: true
          description: Error message if the import had issues (null on full success).

    DataImportRun:
      type: object
      required: [id, sourceName, tapQuery, retrievedAt, insertedCount, updatedCount, createdAt]
      properties:
        id:
          type: string
        sourceName:
          type: string
          description: Name of the data source (e.g. "NASA Exoplanet Archive").
        tapQuery:
          type: string
          description: The TAP query that was executed.
        retrievedAt:
          type: string
          format: date-time
          description: Timestamp when data was retrieved from the source.
        insertedCount:
          type: integer
          description: Number of new records inserted.
        updatedCount:
          type: integer
          description: Number of existing records updated.
        errorMessage:
          type: string
          nullable: true
          description: Error message if the import had issues (null on success).
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this import run record was created.

    PaginatedImportRunsResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DataImportRun"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    BookingsSummaryResponse:
      type: object
      required: [totalBookings, byTravelClass, byPeriod]
      properties:
        totalBookings:
          type: integer
        byTravelClass:
          type: array
          items:
            type: object
            required: [travelClass, count]
            properties:
              travelClass:
                type: string
              count:
                type: integer
        byPeriod:
          type: array
          items:
            type: object
            required: [period, count]
            properties:
              period:
                type: string
                description: Date string (YYYY-MM-DD or YYYY-MM).
              count:
                type: integer

    HealthResponse:
      type: object
      required: [status, timestamp, database, uptime]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        database:
          type: string
          enum: [connected, disconnected]
        uptime:
          type: number
          description: Server uptime in seconds.
